<script>
    // ========== GAME SAVE SYSTEM ==========
    const GameSaveSystem = {
        STORAGE_KEY: 'TheyAreComingGameState',
        AUTO_SAVE_INTERVAL: 30000, // 30 seconds
        autoSaveTimer: null,

        init() {
            this.checkForSavedGame();
            this.setupAutoSave();
            this.setupSaveHandlers();
        },

        checkForSavedGame() {
            const savedData = localStorage.getItem(this.STORAGE_KEY);
            const saveStatus = document.getElementById('save-status');
            const continueBtn = document.getElementById('continue-btn');
            const saveTime = document.getElementById('save-time');

            if (savedData) {
                try {
                    const data = JSON.parse(savedData);
                    const lastSave = new Date(data.timestamp);
                    const timeStr = lastSave.toLocaleString();
                    
                    saveStatus.textContent = `Last saved: ${timeStr}`;
                    continueBtn.style.display = 'inline-block';
                    saveTime.textContent = `Game progress available from ${timeStr}`;
                    
                    continueBtn.onclick = () => this.loadGame();
                } catch (e) {
                    console.error('Failed to parse saved data:', e);
                    this.clearSavedGame();
                }
            } else {
                saveStatus.textContent = 'No saved game found';
                saveTime.textContent = 'Start a new game to begin playing';
            }
        },

        startNewGame() {
            localStorage.removeItem(this.STORAGE_KEY);
            this.hideMenu();
            this.startGame();
        },

        loadGame() {
            const savedData = localStorage.getItem(this.STORAGE_KEY);
            if (savedData) {
                try {
                    const data = JSON.parse(savedData);
                    this.hideMenu();
                    this.startGame(data.gameState);
                } catch (e) {
                    console.error('Failed to load game:', e);
                    this.startNewGame();
                }
            } else {
                this.startNewGame();
            }
        },

        startGame(resumeData = null) {
            window.resumeGameData = resumeData;
            initializeGameEngine();
        },

        hideMenu() {
            const menu = document.getElementById('save-menu');
            menu.classList.add('hidden');
        },

        saveGameState(gameStateData) {
            try {
                const saveData = {
                    gameState: gameStateData,
                    timestamp: new Date().toISOString(),
                    version: '1.19'
                };
                localStorage.setItem(this.STORAGE_KEY, JSON.stringify(saveData));
                this.showAutoSaveIndicator();
            } catch (e) {
                console.error('Failed to save game state:', e);
            }
        },

        setupAutoSave() {
            this.autoSaveTimer = setInterval(() => {
                if (window.myGameInstance && initGame) {
                    // Request game state from Unity
                    window.myGameInstance.SendMessage('GameManager', 'RequestGameState');
                }
            }, this.AUTO_SAVE_INTERVAL);
        },

        setupSaveHandlers() {
            // Listen for save requests from the game
            window.onGameStateReceived = (gameStateJSON) => {
                this.saveGameState(gameStateJSON);
            };

            // Backup: Save on page unload
            window.addEventListener('beforeunload', () => {
                if (window.myGameInstance && initGame) {
                    window.myGameInstance.SendMessage('GameManager', 'RequestGameState');
                }
            });
        },

        showAutoSaveIndicator() {
            const indicator = document.getElementById('auto-save-indicator');
            indicator.textContent = '💾 Game Saved!';
            indicator.classList.add('saved');
            
            setTimeout(() => {
                indicator.textContent = '💾 Auto-saving...';
                indicator.classList.remove('saved');
            }, 2000);
        },

        clearSavedGame() {
            localStorage.removeItem(this.STORAGE_KEY);
        }
    };

    // Initialize save system
    GameSaveSystem.init();

    // Set up menu buttons
    document.getElementById('new-game-btn').onclick = () => GameSaveSystem.startNewGame();

    const hideFullScreenButton = "";
    const buildUrl = "https://cdn.jsdelivr.net/gh/awaiblecomponent/575@main/Build";
    const loaderUrl = buildUrl + "/zombieshooterdone.loader.js";
    const config = {
        dataUrl: buildUrl + "/zombieshooterdone.data.br",
        frameworkUrl: buildUrl + "/zombieshooterdone.framework.js",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "OnHitDev",
        productName: "They Are Coming",
        productVersion: "1.19"
    };

    const wasmParts = [
        `${buildUrl}/zombieshooterdone.wasm.br.part0`,
        `${buildUrl}/zombieshooterdone.wasm.br.part1`,
        `${buildUrl}/zombieshooterdone.wasm.br.part2`,
        `${buildUrl}/zombieshooterdone.wasm.br.part3`
    ];

    async function fetchAndMergeWasm() {
        const parts = await Promise.all(wasmParts.map(url =>
            fetch(url).then(r => {
                if (!r.ok) throw new Error(`Failed to load ${url}`);
                return r.arrayBuffer();
            })
        ));
        const totalLength = parts.reduce((sum, part) => sum + part.byteLength, 0);
        const merged = new Uint8Array(totalLength);
        let offset = 0;
        for (const part of parts) {
            merged.set(new Uint8Array(part), offset);
            offset += part.byteLength;
        }
        const blob = new Blob([merged], { type: "application/wasm+br" });
        return URL.createObjectURL(blob);
    }

    function initializeGameEngine() {
        fetchAndMergeWasm().then(blobUrl => {
            config.codeUrl = blobUrl;

            const script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(document.querySelector("#unity-canvas"), config, (progress) => {
                    const loader = document.querySelector("#unity-loading-bar");
                    if (loader) loader.style.width = `${progress * 100}%`;
                }).then((unityInstance) => {
                    myGameInstance = unityInstance;
                    document.querySelector("#loading-cover").style.display = "none";
                    
                    // If we have saved game data, send it to Unity
                    if (window.resumeGameData) {
                        myGameInstance.SendMessage('GameManager', 'LoadGameState', window.resumeGameData);
                    }
                }).catch((message) => {
                    console.error("Unity yükleme hatası:", message);
                });
            };
            document.body.appendChild(script);
        });
    }

    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingCover = document.querySelector("#loading-cover");
    const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const spinner = document.querySelector('.spinner');

    const canFullscreen = (function () {
        for (const key of [
            'exitFullscreen',
            'webkitExitFullscreen',
            'webkitCancelFullScreen',
            'mozCancelFullScreen',
            'msExitFullscreen',
        ]) {
            if (key in document) {
                return true;
            }
        }
        return false;
    }());

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        container.className = "unity-mobile";
    }

    loadingCover.style.background = "url('background.png') center / cover";
    loadingCover.style.display = "";

    document.addEventListener('contextmenu', event => event.preventDefault());

    function FocusGame() {
        window.focus();
        canvas.focus();
    }

    window.addEventListener('pointerdown', FocusGame);
    window.addEventListener('touchstart', FocusGame);

    let StartUnityInstance;
    let myGameInstance;
    let ysdk = null;

    let environmentData = {
        language: "en",
        domain: "default_domain",
        deviceType: "desktop",
        isMobile: false,
        isDesktop: true,
        isTablet: false,
        isTV: false,
        appID: "default_app_id",
        browserLang: navigator.language || "en",
        payload: null,
        promptCanShow: false,
        reviewCanShow: false,
        platform: navigator.platform,
        browser: (function() {
            let userAgent = navigator.userAgent;
            if (userAgent.includes("YaBrowser")) return "Yandex";
            if (userAgent.includes("OPR") || userAgent.includes("Opera")) return "Opera";
            if (userAgent.includes("Firefox")) return "Firefox";
            if (userAgent.includes("MSIE") || userAgent.includes("Trident")) return "IE";
            if (userAgent.includes("Edge")) return "Edge";
            if (userAgent.includes("Chrome")) return "Chrome";
            if (userAgent.includes("Safari")) return "Safari";
            return "Other";
        })()
    };
    
    let cloudSaves = 'noData';
    let paymentsData = 'none';
    let playerData = 'noData';
    let player = null;
    let payments = null;
    let initGame = false;
    let nowFullAdOpen = false;

    function GetPayments() { console.warn("GetPayments is not implemented"); return Promise.resolve("none"); }
    function SaveCloud() { console.warn("SaveCloud is not implemented"); }
    function LoadCloud() { console.warn("LoadCloud is not implemented"); return Promise.resolve("noData"); }
    function InitPlayer() { console.warn("InitPlayer is not implemented"); return Promise.resolve("noData"); }

    function FullAdShow() {
        try {
            if (!nowFullAdOpen) {
                nowFullAdOpen = true;
                if (initGame) {
                    myGameInstance.SendMessage("YandexGame", "OpenFullAd");
                }
                setTimeout(() => {
                    nowFullAdOpen = false;
                    if (initGame) {
                        myGameInstance.SendMessage("YandexGame", "CloseFullAd", "true");
                    }
                    FocusGame();
                }, 500);
            }
        } catch (error) {
            // Silently handle any errors
        }
    }

    function RewardedShow(rewardId) {
        try {
            myGameInstance.SendMessage("YandexGame", "RewardVideo", rewardId);
            function closeRewardedAd() {
                myGameInstance.SendMessage("YandexGame", "CloseRewardVideo");
                FocusGame();
            }
            closeRewardedAd();
        } catch (error) {
            // Silently handle any errors
        }
    }

    function StickyAdActivity() { console.warn("StickyAdActivity is not implemented"); }
    function Review() { console.warn("Review is not implemented"); }
    function PromptShow() { console.warn("PromptShow is not implemented"); }
    function InitLeaderboards() { console.warn("InitLeaderboards is not implemented"); }
    function GetLeaderboardScores() { console.warn("GetLeaderboardScores is not implemented"); }
    function SetLeaderboardScores() { console.warn("SetLeaderboardScores is not implemented"); }
    function ConsumePurchase() { console.warn("ConsumePurchase is not implemented"); }
    function ConsumePurchases() { console.warn("ConsumePurchases is not implemented"); }

    function InitGame() {
        try {
            console.log('Init Game Success');
            initGame = true;
            if (nowFullAdOpen === true && myGameInstance != null) {
                myGameInstance.SendMessage('YandexGame', 'OpenFullAd');
            }
        } catch (error) {
            console.error("InitGame sırasında hata:", error);
        }
    }

    // Error handling
    window.addEventListener("unhandledrejection", function(event) {
        console.warn("Hata es geçildi:", event.reason);
        event.preventDefault();
    });

    // Ad blocker
    if (window.myGameInstance) {
        const originalSendMessage = window.myGameInstance.SendMessage;
        window.myGameInstance.SendMessage = function(obj, method, value) {
            if (method && method.toString().toLowerCase().includes('ad')) {
                console.log('🚫 AD BLOCKED: ' + method);
                return;
            }
            return originalSendMessage.call(this, obj, method, value);
        };
    }
</script>
